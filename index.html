<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>BMI Calculator</h2>
        <form id="bmiForm">
            <label for="gender">Gender:</label>
            <select id="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <label for="age">Age:</label>
            <input type="number" id="age" placeholder="Enter Your Height" required>
            <label for="feet">Height:</label>
            <input type="number" id="feet" placeholder="Feet" required>
            <input type="number" id="inches" placeholder="Inches" required>
            <label for="weight">Weight:</label>
            <input type="number" id="weight" placeholder="Enter Your Weight in Kg" >
            
            <input type="submit" value="Calculator BMI"> 
        </form>

    <div id="result"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
